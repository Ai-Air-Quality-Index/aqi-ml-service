services:
  - type: web
    name: aqi-ml-service
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /
    envVars:
      - key: MONGO_URI
        sync: false
      - key: RETRAIN_EVERY
        value: "100"
